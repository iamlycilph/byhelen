<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Словарь">
<link rel="apple-touch-icon" href="icon.png">
<title>Словарь · уроки с Еленой</title>
<style>
:root{
  --paper:#F3F4F0; --ink:#22301F; --muted:#8A9086; --line:#E3E5DD;
  --card:#FFFFFF; --mark:#FFE066; --ok:#2F7D5B; --bad:#C4452C;
  --serif:"Iowan Old Style",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans)}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.wrap{max-width:560px;margin:0 auto;padding:12px 16px 40px}
header{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 14px}
header h1{font-family:var(--serif);font-size:22px;margin:0;font-weight:600}
header .sub{font-size:12px;color:var(--muted)}
nav{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px}
nav button{flex:1;border:0;background:transparent;font:600 15px var(--sans);color:var(--muted);padding:10px 0;border-radius:9px;cursor:pointer}
nav button.on{background:var(--ink);color:var(--paper)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
label.f{font-size:12px;color:var(--muted);display:block;margin:12px 0 4px}
select,input[type=text],input[type=search],textarea{
  width:100%;font:15px var(--sans);color:var(--ink);background:var(--paper);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;appearance:none}
textarea{resize:vertical;min-height:56px}
.seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg button{flex:1;border:0;background:var(--paper);padding:10px;font:600 14px var(--sans);color:var(--muted);cursor:pointer}
.seg button.on{background:var(--ink);color:var(--paper)}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:14px;margin-top:16px;
  background:var(--ink);color:var(--paper);font:600 16px var(--sans);cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.mark{display:inline;background:linear-gradient(104deg,transparent 2%,var(--mark) 3%,var(--mark) 97%,transparent 98%);
  padding:2px 8px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.q-word{font-family:var(--serif);font-size:26px;line-height:1.45;margin:18px 0 4px}
.q-meta{font-size:12px;color:var(--muted);margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.opts button{border:1px solid var(--line);background:var(--paper);border-radius:12px;
  padding:13px 14px;font:15px var(--sans);color:var(--ink);text-align:left;cursor:pointer;min-height:44px}
.opts button.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.opts button.bad{background:var(--bad);border-color:var(--bad);color:#fff;animation:sh .25s}
.opts button:disabled{opacity:.92}
@keyframes sh{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@media (prefers-reduced-motion:reduce){.opts button.bad{animation:none}}
.prog{font-size:13px;color:var(--muted)}
.card-row{border-bottom:1px solid var(--line);padding:12px 2px}
.card-row:last-child{border:0}
.cr-en{font-family:var(--serif);font-size:17px}
.cr-ru{font-size:14px;margin-top:2px}
.cr-ex{font-size:13px;color:var(--muted);font-style:italic;margin-top:4px}
.badge{font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);
  border:1px solid var(--line);border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:2px}
.badge.auto{border-color:var(--mark);background:var(--mark);color:var(--ink)}
.star{float:right;border:0;background:none;font-size:20px;cursor:pointer;color:#C9CCC2;padding:2px 6px}
.star.on{color:#E4A11B}
.cbtn{border:0;background:none;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 0;text-decoration:underline}
.comment-box{margin-top:8px}
.comment-view{font-size:13px;background:var(--paper);border-left:3px solid var(--mark);padding:6px 10px;margin-top:6px;white-space:pre-wrap}
.result{text-align:center;padding:10px 0}
.result .big{font-family:var(--serif);font-size:40px}
.mist{margin-top:14px;text-align:left}
.foot{margin-top:22px;font-size:12px;color:var(--muted)}
.foot button{margin-right:12px}
.count{font-size:12px;color:var(--muted);margin:8px 2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="mark">Словарь</span></h1>
    <span class="sub" id="hdr-sub"></span>
  </header>
  <nav>
    <button id="tab-quiz" class="on">Квиз</button>
    <button id="tab-dict">Словарь</button>
  </nav>
  <main id="main"></main>
  <div class="foot" id="foot"></div>
</div>
<script src="data.js"></script>
<script>
(function(){
"use strict";
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(){});}
if(!window.VOCAB){
  document.getElementById("main").innerHTML='<div class="panel">Не удалось загрузить словарь (data.js).<br>Проверь сеть и попробуй ещё раз.</div>'
   +'<button class="btn" onclick="location.reload()">Обновить</button>';
  return;
}
const $=s=>document.querySelector(s);
const CARDS=window.VOCAB.cards, LESSONS=window.VOCAB.lessons;
const store={
  get(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
};
let comments=store.get("vq.comments",{}), stars=store.get("vq.stars",{});
const saveC=()=>store.set("vq.comments",comments), saveS=()=>store.set("vq.stars",stars);
$("#hdr-sub").textContent=CARDS.length+" карточек · "+LESSONS.length+" уроков";

/* ---------- state ---------- */
let tab="quiz";
let quiz=null; // {list,i,score,dir,mistakes,len}
let setup={dir:"en-ru",scope:"all",len:20};
let dictQ="",dictLesson="all",dictFilter="none";

/* ---------- helpers ---------- */
const esc=s=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
function scopeCards(scope){
  if(scope==="all")return CARDS;
  if(scope==="stars")return CARDS.filter(c=>stars[c.k]);
  if(scope==="auto")return CARDS.filter(c=>c.auto);
  const n=+scope; return CARDS.filter(c=>c.lesson===n);
}
function distractors(card,pool,dir,n){
  const key=dir==="en-ru"?"ru":"en";
  const seen=new Set([card.k]); const out=[];
  const near=shuffle(pool.filter(c=>c.lesson===card.lesson));
  const far=shuffle(CARDS);
  for(const src of [near,far]){
    for(const c of src){
      if(out.length>=n)break;
      if(seen.has(c.k))continue;
      seen.add(c.k); out.push(c[key]);
    }
  }
  return out.slice(0,n);
}

/* ---------- quiz ---------- */
function startQuiz(){
  const pool=scopeCards(setup.scope);
  if(pool.length<4){renderQuizSetup("В этой выборке меньше 4 карточек — не из чего собрать варианты.");return}
  const len=setup.len===0?pool.length:Math.min(setup.len,pool.length);
  quiz={list:shuffle(pool).slice(0,len),i:0,score:0,dir:setup.dir,mistakes:[],len};
  renderQuestion();
}
function renderQuestion(){
  const c=quiz.list[quiz.i];
  const qKey=quiz.dir==="en-ru"?"en":"ru", aKey=quiz.dir==="en-ru"?"ru":"en";
  const opts=shuffle([c[aKey],...distractors(c,scopeCards(setup.scope),quiz.dir,3)]);
  $("#main").innerHTML=
   '<div class="panel">'
   +'<div class="row" style="justify-content:space-between"><span class="prog">'+(quiz.i+1)+' / '+quiz.len+'</span>'
   +'<span class="prog">верно: '+quiz.score+'</span></div>'
   +'<div class="q-word"><span class="mark" id="q-word">'+esc(c[qKey])+'</span></div>'
   +'<div class="q-meta">урок '+c.lesson+' · '+esc(LESSONS[c.lesson-1].date)+(c.auto?' · <span class="badge auto">авто</span>':'')+'</div>'
   +'<div class="opts" id="opts">'+opts.map(o=>'<button data-v="'+esc(o)+'">'+esc(o)+'</button>').join("")+'</div>'
   +'</div><button class="btn ghost" id="q-quit">Завершить</button>';
  $("#q-quit").onclick=finishQuiz;
  $("#opts").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>answer(b,c,aKey);
  });
}
function answer(btn,card,aKey){
  const right=btn.dataset.v===card[aKey];
  document.querySelectorAll("#opts button").forEach(b=>{
    b.disabled=true;
    if(b.dataset.v===card[aKey])b.classList.add("ok");
  });
  const next=()=>{quiz.i++;quiz.i<quiz.len?renderQuestion():finishQuiz()};
  const ex=(card.ex&&card.ex[0])||"";
  if(ex){
    const d=document.createElement("div");
    d.className="cr-ex";d.style.margin="14px 2px 0";d.textContent=ex;
    $("#opts").after(d);
  }
  if(right){quiz.score++;document.querySelectorAll(".prog")[1].textContent="верно: "+quiz.score;}
  else{btn.classList.add("bad");quiz.mistakes.push(card);}
  const b=document.createElement("button");
  b.className="btn";b.textContent="Дальше";b.style.marginTop="14px";
  b.onclick=next;
  $("#opts").parentElement.appendChild(b);
}
function finishQuiz(){
  const m=quiz.mistakes;
  $("#main").innerHTML='<div class="panel result">'
   +'<div class="big">'+quiz.score+' / '+(quiz.i)+'</div>'
   +'<div class="prog">направление: '+(quiz.dir==="en-ru"?"EN → RU":"RU → EN")+'</div>'
   +(m.length?'<div class="mist"><b>Разобрать ошибки:</b>'+m.map(c=>rowHTML(c)).join("")+'</div>':'')
   +'</div><button class="btn" id="again">Ещё раз</button><button class="btn ghost" id="tosetup">Настройки квиза</button>';
  bindRows($("#main"));
  $("#again").onclick=startQuiz;
  $("#tosetup").onclick=()=>renderQuizSetup();
  quiz=null;
}
function renderQuizSetup(msg){
  const lessonOpts=LESSONS.map(l=>'<option value="'+l.n+'"'+(String(setup.scope)===String(l.n)?" selected":"")+'>Урок '+l.n+' — '+esc(l.date)+'</option>').join("");
  $("#main").innerHTML='<div class="panel">'
   +(msg?'<div class="q-meta" style="color:var(--bad)">'+esc(msg)+'</div>':'')
   +'<label class="f">Направление</label>'
   +'<div class="seg" id="dir"><button data-v="en-ru"'+(setup.dir==="en-ru"?' class="on"':'')+'>EN → RU</button>'
   +'<button data-v="ru-en"'+(setup.dir==="ru-en"?' class="on"':'')+'>RU → EN</button></div>'
   +'<label class="f">Что учим</label>'
   +'<select id="scope">'
   +'<option value="all"'+(setup.scope==="all"?" selected":"")+'>Все слова</option>'
   +'<option value="stars"'+(setup.scope==="stars"?" selected":"")+'>⭐ Сложные</option>'
   +'<option value="auto"'+(setup.scope==="auto"?" selected":"")+'>Авто-переводы (проверить)</option>'
   +lessonOpts+'</select>'
   +'<label class="f">Длина серии</label>'
   +'<div class="seg" id="len"><button data-v="10"'+(setup.len===10?' class="on"':'')+'>10</button>'
   +'<button data-v="20"'+(setup.len===20?' class="on"':'')+'>20</button>'
   +'<button data-v="0"'+(setup.len===0?' class="on"':'')+'>Все</button></div>'
   +'</div><button class="btn" id="go">Начать</button>';
  $("#dir").querySelectorAll("button").forEach(b=>b.onclick=()=>{setup.dir=b.dataset.v;renderQuizSetup(); });
  $("#len").querySelectorAll("button").forEach(b=>b.onclick=()=>{setup.len=+b.dataset.v;renderQuizSetup();});
  $("#scope").onchange=e=>setup.scope=e.target.value;
  $("#go").onclick=startQuiz;
}

/* ---------- dictionary ---------- */
function rowHTML(c){
  const st=stars[c.k]?" on":"";
  const cm=comments[c.k];
  return '<div class="card-row" data-k="'+esc(c.k)+'">'
   +'<button class="star'+st+'" title="сложное">★</button>'
   +'<div class="cr-en">'+esc(c.en)
   +(c.auto?'<span class="badge auto">авто</span>':'')
   +'<span class="badge">урок '+c.lesson+'</span></div>'
   +'<div class="cr-ru">'+esc(c.ru)+'</div>'
   +(c.ex&&c.ex.length?'<div class="cr-ex">'+c.ex.map(esc).join(" · ")+'</div>':'')
   +(cm?'<div class="comment-view">'+esc(cm)+'</div>':'')
   +'<button class="cbtn">'+(cm?"изменить комментарий":"комментарий")+'</button>'
   +'<div class="comment-box" hidden><textarea placeholder="Заметка к слову…">'+(cm?esc(cm):"")+'</textarea>'
   +'<button class="btn" style="margin-top:8px;padding:10px">Сохранить</button></div>'
   +'</div>';
}
function bindRows(root){
  root.querySelectorAll(".card-row").forEach(row=>{
    const k=row.dataset.k;
    row.querySelector(".star").onclick=e=>{
      if(stars[k])delete stars[k];else stars[k]=1;
      saveS(); e.target.classList.toggle("on");
    };
    const box=row.querySelector(".comment-box");
    row.querySelector(".cbtn").onclick=()=>{box.hidden=!box.hidden;if(!box.hidden)box.querySelector("textarea").focus()};
    box.querySelector(".btn").onclick=()=>{
      const v=box.querySelector("textarea").value.trim();
      if(v)comments[k]=v;else delete comments[k];
      saveC(); if(tab==="dict")renderDict(); else box.hidden=true;
    };
  });
}
function renderDict(){
  let list=CARDS;
  if(dictLesson!=="all")list=list.filter(c=>c.lesson===+dictLesson);
  if(dictFilter==="stars")list=list.filter(c=>stars[c.k]);
  if(dictFilter==="auto")list=list.filter(c=>c.auto);
  if(dictFilter==="comm")list=list.filter(c=>comments[c.k]);
  const q=dictQ.trim().toLowerCase();
  if(q)list=list.filter(c=>c.en.toLowerCase().includes(q)||c.ru.toLowerCase().includes(q));
  const lessonOpts=LESSONS.map(l=>'<option value="'+l.n+'"'+(dictLesson===String(l.n)?" selected":"")+'>Урок '+l.n+' — '+esc(l.date)+'</option>').join("");
  $("#main").innerHTML='<div class="panel">'
   +'<input type="search" id="d-q" placeholder="Поиск по-английски или по-русски" value="'+esc(dictQ)+'">'
   +'<div class="row" style="margin-top:8px">'
   +'<select id="d-lesson" style="flex:1"><option value="all">Все уроки</option>'+lessonOpts+'</select>'
   +'<select id="d-filter" style="flex:1">'
   +'<option value="none"'+(dictFilter==="none"?" selected":"")+'>Без фильтра</option>'
   +'<option value="stars"'+(dictFilter==="stars"?" selected":"")+'>⭐ Сложные</option>'
   +'<option value="auto"'+(dictFilter==="auto"?" selected":"")+'>Авто-переводы</option>'
   +'<option value="comm"'+(dictFilter==="comm"?" selected":"")+'>С комментариями</option>'
   +'</select></div>'
   +'<div class="count">'+list.length+' карточек</div>'
   +'<div id="d-list">'+list.slice(0,400).map(rowHTML).join("")
   +(list.length>400?'<div class="count">Показаны первые 400 — сузь поиск.</div>':"")+'</div></div>';
  const qi=$("#d-q");
  qi.oninput=e=>{dictQ=e.target.value;clearTimeout(qi._t);qi._t=setTimeout(renderDict,200)};
  $("#d-lesson").onchange=e=>{dictLesson=e.target.value;renderDict()};
  $("#d-filter").onchange=e=>{dictFilter=e.target.value;renderDict()};
  bindRows($("#d-list"));
}

/* ---------- export / import ---------- */
function renderFoot(){
  $("#foot").innerHTML='Заметки и звёзды живут в этом браузере. '
   +'<button class="cbtn" id="exp">Экспорт заметок</button>'
   +'<button class="cbtn" id="imp">Импорт</button>';
  $("#exp").onclick=()=>{
    const blob=new Blob([JSON.stringify({comments,stars},null,1)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="vocab-notes.json";a.click();
  };
  $("#imp").onclick=()=>{
    const v=prompt("Вставь содержимое vocab-notes.json:");
    if(!v)return;
    try{const d=JSON.parse(v);comments=d.comments||{};stars=d.stars||{};saveC();saveS();
      alert("Импортировано");tab==="dict"?renderDict():renderQuizSetup();}
    catch(e){alert("Не получилось разобрать JSON")}
  };
}

/* ---------- tabs ---------- */
function setTab(t){
  tab=t;
  $("#tab-quiz").classList.toggle("on",t==="quiz");
  $("#tab-dict").classList.toggle("on",t==="dict");
  t==="quiz"?renderQuizSetup():renderDict();
}
$("#tab-quiz").onclick=()=>setTab("quiz");
$("#tab-dict").onclick=()=>setTab("dict");
renderFoot(); setTab("quiz");
window.__app={startQuiz,setup,scopeCards,distractors}; // для автотестов
})();
</script>
</body>
</html>
