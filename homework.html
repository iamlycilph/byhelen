<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon.png">
<title>Домашка · уроки с Еленой</title>
<style>
:root{
  --paper:#F3F4F0; --ink:#22301F; --muted:#8A9086; --line:#E3E5DD;
  --card:#FFFFFF; --mark:#FFE066; --ok:#2F7D5B; --bad:#C4452C;
  --serif:"Iowan Old Style",Georgia,"Times New Roman",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans)}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.wrap{max-width:560px;margin:0 auto;padding:12px 16px 40px}
header{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 14px}
header h1{font-family:var(--serif);font-size:22px;margin:0;font-weight:600}
header .sub{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
nav{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px}
nav button{flex:1;border:0;background:transparent;font:600 15px var(--sans);color:var(--muted);padding:10px 0;border-radius:9px;cursor:pointer}
nav button.on{background:var(--ink);color:var(--paper)}
.mark{display:inline;background:linear-gradient(104deg,transparent 2%,var(--mark) 3%,var(--mark) 97%,transparent 98%);
  padding:2px 8px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:14px;margin-top:16px;
  background:var(--ink);color:var(--paper);font:600 16px var(--sans);cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.cbtn{border:0;background:none;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 0;text-decoration:underline}
.prog{font-size:13px;color:var(--muted);margin:0 2px 8px}
.seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:14px}
.seg button{flex:1;border:0;background:var(--paper);padding:10px;font:600 14px var(--sans);color:var(--muted);cursor:pointer}
.seg button.on{background:var(--ink);color:var(--paper)}

/* список тестов */
.tcard{margin-bottom:12px}
.tcard h2{font-family:var(--serif);font-size:19px;margin:0 0 4px;font-weight:600}
.tcard .topics{font-size:12px;color:var(--muted);margin:0 0 2px}
.tcard .meta{font-size:13px;color:var(--muted);margin:0}
.tcard .best{color:var(--ok);font-weight:600}

/* вопрос */
.sentence{font-family:var(--serif);font-size:21px;line-height:1.7;margin-bottom:14px}
.slot{display:inline-block;min-width:56px;background:var(--paper);
  border-bottom:2px solid var(--muted);border-radius:4px 4px 0 0}
.fill{color:var(--ok);font-weight:700;border-bottom:2px solid var(--ok)}
.sentence mark,.mist mark{background:linear-gradient(104deg,transparent 2%,var(--mark) 3%,var(--mark) 97%,transparent 98%);
  color:inherit;padding:1px 4px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.opts{display:flex;flex-direction:column;gap:8px}
.opts button{border:1px solid var(--line);background:var(--paper);border-radius:12px;
  padding:13px 14px;font:15px var(--sans);color:var(--ink);text-align:left;cursor:pointer;min-height:44px}
.opts button .lt{color:var(--muted);font-weight:600;margin-right:8px}
.opts button.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.opts button.bad{background:var(--bad);border-color:var(--bad);color:#fff;animation:sh .25s}
.opts button.ok .lt,.opts button.bad .lt{color:#fff;opacity:.85}
.opts button.faded{opacity:.45}
.opts button:disabled{cursor:default}
@keyframes sh{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@media (prefers-reduced-motion:reduce){.opts button.bad{animation:none}}
.why{background:var(--paper);border-left:3px solid var(--mark);padding:8px 12px;
  font-size:14px;line-height:1.5;margin-top:12px}

/* итог */
.result{text-align:center;padding:10px 0}
.result .big{font-family:var(--serif);font-size:40px}
.result .sub{font-size:13px;color:var(--muted);margin-top:4px}
h3.sec{font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);
  font-weight:600;margin:20px 2px 8px}
.mist{margin-bottom:10px;font-size:15px}
.mist .n{font-size:12px;color:var(--muted);margin-bottom:4px}
.mist .sen{font-family:var(--serif);font-size:17px;line-height:1.6}
.mist .yours{color:var(--bad);font-size:13px;margin-top:6px}
.mist .w{color:var(--muted);font-size:13px;margin-top:4px}

/* статистика */
.trow{display:flex;align-items:baseline;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line)}
.trow:last-child{border:0}
.trow .name{flex:1;font-size:14px}
.trow .cnt{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.bar{height:4px;background:var(--paper);border-radius:2px;overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:var(--bad)}
.hrow{display:flex;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);
  font-size:13px;color:var(--muted)}
.hrow:last-child{border:0}
.hrow .d{width:88px;flex:none;font-variant-numeric:tabular-nums}
.hrow .t{flex:1;color:var(--ink)}
.hrow .s{font-variant-numeric:tabular-nums}
.empty{font-size:13px;color:var(--muted);padding:4px 2px}
.foot{margin-top:22px;font-size:12px;color:var(--muted)}
.foot button{margin-right:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chips button{flex:0 0 auto;min-height:40px;padding:9px 14px;font-size:15px}
.built{min-height:48px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.built .word{background:var(--paper);border:1px solid var(--line);border-radius:9px;
  padding:7px 11px;font-family:var(--serif);font-size:17px;cursor:pointer}
.built.okline .word{background:var(--ok);border-color:var(--ok);color:#fff;cursor:default}
.built.badline .word{background:var(--bad);border-color:var(--bad);color:#fff;cursor:default}
.built .hint{color:var(--muted);font-size:13px;font-family:var(--sans)}
button:focus-visible{outline:3px solid #B9CDC1;outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="mark">Домашка</span></h1>
    <span class="sub" id="hProg"></span>
  </header>
  <nav>
    <button id="nav-quiz">Квиз</button>
    <button id="nav-dict">Словарь</button>
    <button id="nav-hw" class="on">Домашка</button>
  </nav>

  <div class="seg" id="hwTabs">
    <button id="seg-tests" class="on">Тесты</button>
    <button id="seg-stats">Статистика</button>
  </div>

  <section id="vList"></section>
  <section id="vStats" hidden></section>

  <section id="vQuiz" hidden>
    <p class="prog" id="qNum"></p>
    <div class="panel sentence" id="qSentence" aria-live="polite"></div>
    <div class="opts" id="qOpts"></div>
    <div class="why" id="qWhy" hidden></div>
    <button id="btnNext" class="btn" hidden>Дальше</button>
    <button id="btnQuit" class="cbtn">← к списку тестов</button>
  </section>

  <section id="vResult" hidden></section>

  <div class="foot" id="foot">
    История попыток живёт в этом браузере.
    <button class="cbtn" id="btnExp">Экспорт истории</button>
    <button class="cbtn" id="btnImp">Импорт</button>
    <input type="file" id="impFile" accept=".json" hidden>
  </div>
</div>

<script src="homework-data.js"></script>
<script>
(function(){
  "use strict";
  var TESTS = window.HOMEWORK_TESTS || [];
  var K_BEST = "hwBest", K_LOG = "hwLog";
  var $ = function(id){ return document.getElementById(id); };

  /* ---------- чистые функции (используются и автотестами) ---------- */

  function assemble(sentence, option){
    var gaps = sentence.split("___");
    var parts = option.split(" / ");
    var seg = [{t:"text", v:gaps[0]}];
    for (var i=0; i<parts.length; i++){
      var p = parts[i];
      if (p.charAt(0) === "'"){
        var last = seg[seg.length-1];
        if (last.t === "text") last.v = last.v.replace(/\s+$/,"");
      }
      seg.push({t:"fill", v:p});
      seg.push({t:"text", v:gaps[i+1] || ""});
    }
    return seg;
  }

  function assembleText(sentence, option){
    return assemble(sentence, option).map(function(s){return s.v;}).join("")
      .replace(/\s+([?.!,])/g, "$1").replace(/\s{2,}/g, " ").trim();
  }

  function esc(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function markKeys(html, keys){
    if (!keys || !keys.length) return html;
    var chunks = html.split(/(<[^>]+>)/);
    keys.forEach(function(k){
      var ek = esc(k), done = false;
      for (var i=0; i<chunks.length && !done; i++){
        if (chunks[i].charAt(0) === "<") continue;
        var at = chunks[i].indexOf(ek);
        if (at >= 0){
          chunks[i] = chunks[i].slice(0,at) + "<mark>" + ek + "</mark>" + chunks[i].slice(at+ek.length);
          done = true;
        }
      }
    });
    return chunks.join("");
  }

  function sentenceHTML(sentence, option, keys){
    if (option === null){
      return sentence.split("___").map(esc).join('<span class="slot">&nbsp;&nbsp;&nbsp;</span>');
    }
    var html = assemble(sentence, option).map(function(s){
      return s.t === "fill" ? '<span class="fill">'+esc(s.v)+'</span>' : esc(s.v);
    }).join("");
    return markKeys(html, keys);
  }

  // Правильный ответ задания как текст/разметка — для любого типа
  function taskCorrectText(task){
    if (task.type === "order") return task.target;
    if (task.type === "fix") return task.o[task.a];
    return assembleText(task.s, task.o[task.a]);
  }
  function taskCorrectHTML(task){
    if (task.type === "order") return markKeys(esc(task.target), task.keys);
    if (task.type === "fix") return markKeys(esc(task.o[task.a]), task.keys);
    return sentenceHTML(task.s, task.o[task.a], task.keys);
  }
  // Как показать то, что выбрал человек (ch: индекс или собранная строка)
  function userAnswerText(task, ch){
    if (ch === null || ch === undefined) return "(не записан)";
    if (task.type === "order") return String(ch);
    if (typeof ch !== "number" || !task.o[ch]) return String(ch);
    var letter = (task.type === "bank") ? "" : "ABCD".charAt(ch) + ") ";
    return letter + task.o[ch];
  }
  function fmtDate(iso){
    try{
      return new Date(iso).toLocaleDateString("ru-RU", {day:"numeric", month:"short"});
    }catch(e){ return iso.slice(0,10); }
  }

  /* ---------- хранилище ---------- */
  function lsGet(key){ try{ return JSON.parse(localStorage.getItem(key)||"{}"); }catch(e){ return {}; } }
  function lsSet(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }

  // Сырая лента событий: start / answer / finish / quit, каждая с временем.
  // ms в answer — сколько думал от показа вопроса до нажатия.
  var K_EV = "hwEvents";
  function evGet(){ try{ return JSON.parse(localStorage.getItem(K_EV)||"[]"); }catch(e){ return []; } }
  function addEvent(ev){
    try{
      var a = evGet();
      ev.t = new Date().toISOString();
      a.push(ev);
      if (a.length > 5000) a = a.slice(a.length - 5000);
      localStorage.setItem(K_EV, JSON.stringify(a));
    }catch(e){}
  }
  function saveBest(id, val){
    var b = lsGet(K_BEST);
    if (!(id in b) || val > b[id]){ b[id] = val; lsSet(K_BEST, b); }
  }
  // Запись попытки: дата, счёт, ошибки как {n: номер, ch: индекс выбранного}.
  function logAttempt(id, score, total, wrongEntries){
    var log = lsGet(K_LOG);
    (log[id] = log[id] || []).push({ d:new Date().toISOString(), score:score, total:total, wrong:wrongEntries });
    lsSet(K_LOG, log);
  }
  // Старые записи хранили просто номера — приводим к общему виду.
  function normWrong(at){
    return (at.wrong||[]).map(function(w){
      return typeof w === "number" ? {n:w, ch:null} : w;
    });
  }

  /* ---------- состояние и экраны ---------- */
  var st = { test:null, i:0, score:0, wrong:[] };

  function show(view){
    ["vList","vStats","vQuiz","vResult"].forEach(function(v){ $(v).hidden = (v !== view); });
    var home = (view === "vList" || view === "vStats");
    $("hwTabs").hidden = !home;
    $("foot").hidden = !home;
    $("seg-tests").classList.toggle("on", view === "vList");
    $("seg-stats").classList.toggle("on", view === "vStats");
    if (home) $("hProg").textContent = "";
  }

  /* ---------- список тестов ---------- */
  function renderList(){
    var box = $("vList"); box.innerHTML = "";
    var b = lsGet(K_BEST), log = lsGet(K_LOG);
    TESTS.slice().sort(function(x,y){ return (y.date||"").localeCompare(x.date||""); })
    .forEach(function(t){
      var card = document.createElement("div"); card.className = "panel tcard";
      var h = document.createElement("h2"); h.textContent = t.title; card.appendChild(h);
      var tp = document.createElement("p"); tp.className = "topics";
      tp.textContent = t.topics.join(" · "); card.appendChild(tp);
      var attempts = log[t.id] || [];
      var bits = [t.tasks.length + " заданий"];
      if (t.date) bits.push("от " + fmtDate(t.date));
      if (attempts.length) bits.push("попыток: " + attempts.length);
      var m = document.createElement("p"); m.className = "meta";
      m.textContent = bits.join(" · ");
      if (t.id in b){
        m.appendChild(document.createTextNode(" · "));
        var s = document.createElement("span"); s.className = "best";
        s.textContent = "лучший: " + b[t.id] + "/" + t.tasks.length;
        m.appendChild(s);
      }
      card.appendChild(m);
      var btn = document.createElement("button"); btn.className = "btn";
      btn.textContent = "Начать";
      btn.onclick = function(){ startTest(t); };
      card.appendChild(btn);
      box.appendChild(card);
    });
    show("vList");
  }

  /* ---------- статистика ---------- */
  function renderStats(){
    var box = $("vStats"); box.innerHTML = "";
    var log = lsGet(K_LOG);
    var byId = {}; TESTS.forEach(function(t){ byId[t.id] = t; });

    // собираем: ошибки/ответы по темам, ошибки по заданиям, ленту попыток
    var topics = {}, perTask = {}, feed = [];
    Object.keys(log).forEach(function(id){
      var t = byId[id]; if (!t) return;
      log[id].forEach(function(at){
        feed.push({ d:at.d, title:t.title, score:at.score, total:at.total });
        var wnums = normWrong(at).map(function(w){ return w.n; });
        t.tasks.forEach(function(task, i){
          var tp = topics[task.t] = topics[task.t] || {err:0, all:0};
          tp.all++;
          if (wnums.indexOf(i+1) >= 0){
            tp.err++;
            var key = id + "#" + (i+1);
            perTask[key] = perTask[key] || {test:t, num:i+1, task:task, err:0};
            perTask[key].err++;
          }
        });
      });
    });

    if (!feed.length){
      var e = document.createElement("div"); e.className = "panel";
      e.innerHTML = '<p class="empty">Пока нет прохождений — статистика появится после первого теста.</p>';
      box.appendChild(e);
      show("vStats"); return;
    }

    // по темам
    var h1 = document.createElement("h3"); h1.className = "sec"; h1.textContent = "По темам";
    box.appendChild(h1);
    var p1 = document.createElement("div"); p1.className = "panel";
    Object.keys(topics)
      .sort(function(a,b){ return topics[b].err/topics[b].all - topics[a].err/topics[a].all; })
      .forEach(function(name){
        var tp = topics[name], pct = Math.round(100*tp.err/tp.all);
        var r = document.createElement("div"); r.className = "trow";
        r.innerHTML = '<div class="name">' + esc(name) +
          '<div class="bar"><i style="width:' + pct + '%"></i></div></div>' +
          '<div class="cnt">' + tp.err + ' из ' + tp.all + '</div>';
        p1.appendChild(r);
      });
    box.appendChild(p1);

    // западающие задания
    var hard = Object.keys(perTask).map(function(k){ return perTask[k]; })
      .sort(function(a,b){ return b.err - a.err; }).slice(0, 10);
    if (hard.length){
      var h2 = document.createElement("h3"); h2.className = "sec";
      h2.textContent = "Западающие задания";
      box.appendChild(h2);
      hard.forEach(function(x){
        var d = document.createElement("div"); d.className = "panel mist";
        d.innerHTML =
          '<div class="n">№ ' + x.num + " · " + esc(x.test.title) + " · ошибок: " + x.err + "</div>" +
          '<div class="sen">' + taskCorrectHTML(x.task) + "</div>" +
          '<div class="w">' + esc(x.task.why) + "</div>";
        box.appendChild(d);
      });
    }

    // история
    var h3 = document.createElement("h3"); h3.className = "sec"; h3.textContent = "История";
    box.appendChild(h3);
    var p3 = document.createElement("div"); p3.className = "panel";
    feed.sort(function(a,b){ return b.d.localeCompare(a.d); }).slice(0, 30)
      .forEach(function(f){
        var r = document.createElement("div"); r.className = "hrow";
        r.innerHTML = '<span class="d">' + fmtDate(f.d) + '</span>' +
          '<span class="t">' + esc(f.title) + '</span>' +
          '<span class="s">' + f.score + "/" + f.total + '</span>';
        p3.appendChild(r);
      });
    box.appendChild(p3);
    show("vStats");
  }

  /* ---------- прохождение ---------- */
  function startTest(t){
    st.test = t; st.i = 0; st.score = 0; st.wrong = [];
    addEvent({ e:"start", test:t.id });
    show("vQuiz");
    renderTask();
  }

  function progLine(){
    var t = st.test;
    $("hProg").textContent = (st.i+1) + " / " + t.tasks.length;
    $("qNum").textContent = "Задание " + (st.i+1) + " из " + t.tasks.length +
      " · верно: " + st.score;
  }

  function renderTask(){
    var task = st.test.tasks[st.i];
    st.qShownAt = Date.now();
    progLine();
    $("qWhy").hidden = true;
    $("btnNext").hidden = true;
    var box = $("qOpts"); box.innerHTML = "";
    var sen = $("qSentence");
    sen.className = "panel sentence";

    if (task.type === "order"){ renderOrder(task, box, sen); return; }

    sen.innerHTML = sentenceHTML(task.s, null, null);
    if (task.type === "bank") box.classList.add("chips"); else box.classList.remove("chips");
    task.o.forEach(function(optText, idx){
      var b = document.createElement("button");
      b.className = "opt"; b.dataset.idx = idx;
      if (task.type !== "bank"){
        var lt = document.createElement("span"); lt.className = "lt";
        lt.textContent = "ABCD".charAt(idx) + ")";
        b.appendChild(lt);
      }
      b.appendChild(document.createTextNode(optText));
      b.onclick = function(){ answer(idx); };
      box.appendChild(b);
    });
  }

  /* ---- сборка вопроса из карточек ---- */
  function renderOrder(task, box, sen){
    st.order = [];
    sen.className = "panel built";
    sen.innerHTML = '<span class="hint">Собирай вопрос — нажимай слова по порядку. Нажатие по слову здесь возвращает его вниз.</span>';
    box.classList.add("chips");
    task.w.forEach(function(word, idx){
      var b = document.createElement("button");
      b.className = "opt"; b.dataset.idx = idx;
      b.appendChild(document.createTextNode(word));
      b.onclick = function(){
        if (b.disabled) return;
        st.order.push(idx); b.disabled = true; b.classList.add("faded");
        drawBuilt(task);
      };
      box.appendChild(b);
    });
    drawBuilt(task);
  }
  function drawBuilt(task){
    var sen = $("qSentence");
    if (!st.order.length){
      sen.innerHTML = '<span class="hint">Собирай вопрос — нажимай слова по порядку. Нажатие по слову здесь возвращает его вниз.</span>';
    } else {
      sen.innerHTML = "";
      st.order.forEach(function(wIdx, pos){
        var w = document.createElement("span"); w.className = "word";
        w.textContent = task.w[wIdx];
        w.onclick = function(){
          if (st.orderDone) return;
          st.order.splice(pos, 1);
          var chip = $("qOpts").querySelector('[data-idx="'+wIdx+'"]');
          chip.disabled = false; chip.classList.remove("faded");
          drawBuilt(task);
        };
        sen.appendChild(w);
      });
    }
    var next = $("btnNext");
    if (st.order.length === task.w.length){
      st.orderDone = false;
      next.textContent = "Проверить"; next.hidden = false;
      next.onclick = function(){ checkOrder(task); };
    } else { next.hidden = true; }
  }
  function checkOrder(task){
    var t = st.test;
    st.orderDone = true;
    var builtWords = st.order.map(function(i){ return task.w[i]; });
    var built = builtWords.join(" ");
    built = built.charAt(0).toUpperCase() + built.slice(1) + "?";
    var right = built.toLowerCase() === task.target.toLowerCase();
    addEvent({ e:"answer", test:t.id, n:st.i+1, ch:built, ok:right,
               ms:Date.now() - st.qShownAt });
    if (right) st.score++;
    else st.wrong.push({ n: st.i+1, task: task, chosen: built });
    $("qSentence").classList.add(right ? "okline" : "badline");
    $("qOpts").innerHTML = "";
    progLine();
    var why = $("qWhy");
    why.innerHTML = (right ? "<b>Верно.</b> " :
      "<b>Правильно: " + esc(task.target) + "</b> ") + esc(task.why);
    why.hidden = false;
    var next = $("btnNext");
    next.textContent = (st.i === t.tasks.length-1) ? "Итоги" : "Дальше";
    next.hidden = false;
    next.onclick = function(){
      if (st.i === t.tasks.length-1) renderResult();
      else { st.i++; renderTask(); }
    };
  }

  function answer(idx){
    var t = st.test, task = t.tasks[st.i];
    var right = (idx === task.a);
    addEvent({ e:"answer", test:t.id, n:st.i+1, ch:idx, ok:right,
               ms:Date.now() - st.qShownAt });
    if (right) st.score++;
    else st.wrong.push({ n: st.i+1, task: task, chosen: idx });

    var btns = $("qOpts").querySelectorAll(".opt");
    btns.forEach(function(b){
      b.disabled = true;
      var i = +b.dataset.idx;
      if (i === task.a) b.classList.add("ok");
      else if (i === idx) b.classList.add("bad");
      else b.classList.add("faded");
    });

    $("qSentence").innerHTML = taskCorrectHTML(task);
    progLine();

    var why = $("qWhy");
    var rightLabel = (task.type === "bank") ? task.o[task.a] :
      "ABCD".charAt(task.a) + ") " + task.o[task.a];
    why.innerHTML = (right ? "<b>Верно.</b> " : "<b>Правильно: " +
      esc(rightLabel) + ".</b> ") + esc(task.why);
    why.hidden = false;

    var next = $("btnNext");
    next.textContent = (st.i === t.tasks.length-1) ? "Итоги" : "Дальше";
    next.hidden = false;
    next.onclick = function(){
      if (st.i === t.tasks.length-1) renderResult();
      else { st.i++; renderTask(); }
    };
  }

  /* ---------- итог ---------- */
  function renderResult(){
    var t = st.test, total = t.tasks.length;
    addEvent({ e:"finish", test:t.id, score:st.score, total:total });
    saveBest(t.id, st.score);
    logAttempt(t.id, st.score, total, st.wrong.map(function(w){ return {n:w.n, ch:w.chosen}; }));

    var box = $("vResult"); box.innerHTML = "";
    $("hProg").textContent = "";

    var sc = document.createElement("div"); sc.className = "panel result";
    sc.innerHTML = '<div class="big">' + st.score + " / " + total + "</div>" +
      '<div class="sub">' + (st.wrong.length ? "Разбор ошибок ниже — с ним к Елене." :
      "Без ошибок.") + "</div>";
    box.appendChild(sc);

    if (st.wrong.length){
      var h = document.createElement("h3"); h.className = "sec";
      h.textContent = "Разбор ошибок"; box.appendChild(h);
      st.wrong.forEach(function(w){
        var d = document.createElement("div"); d.className = "panel mist";
        d.innerHTML =
          '<div class="n">№ ' + w.n + "</div>" +
          '<div class="sen">' + taskCorrectHTML(w.task) + "</div>" +
          '<div class="yours">Твой ответ: ' + esc(userAnswerText(w.task, w.chosen)) + "</div>" +
          '<div class="w">' + esc(w.task.why) + "</div>";
        box.appendChild(d);
      });
    }

    var again = document.createElement("button"); again.className = "btn";
    again.textContent = "Пройти ещё раз";
    again.onclick = function(){ startTest(t); };
    box.appendChild(again);

    var back = document.createElement("button"); back.className = "btn ghost";
    back.textContent = "К списку тестов";
    back.onclick = renderList;
    box.appendChild(back);

    show("vResult");
  }

  /* ---------- экспорт / импорт истории ---------- */
  // Файл экспорта самодостаточен: wrong — машинное поле,
  // "разбор" — то же самое словами (предложение, твой ответ, правильный).
  function buildExport(){
    var log = lsGet(K_LOG), byId = {};
    TESTS.forEach(function(t){ byId[t.id] = t; });
    var out = {};
    Object.keys(log).forEach(function(id){
      out[id] = log[id].map(function(at){
        var rec = { d:at.d, score:at.score, total:at.total, wrong:at.wrong };
        var t = byId[id];
        if (t) rec["разбор"] = normWrong(at).map(function(w){
          var task = t.tasks[w.n-1];
          if (!task) return { "№":w.n };
          return {
            "№": w.n,
            "тема": task.t,
            "предложение": taskCorrectText(task),
            "ответ": userAnswerText(task, w.ch),
            "правильно": (task.type === "order") ? task.target :
              (task.type === "bank") ? task.o[task.a] :
              "ABCD".charAt(task.a) + ") " + task.o[task.a]
          };
        });
        return rec;
      });
    });
    return { hwBest: lsGet(K_BEST), hwLog: out, hwEvents: evGet() };
  }
  $("btnExp").onclick = function(){
    var data = JSON.stringify(buildExport(), null, 2);
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([data], {type:"application/json"}));
    a.download = "homework-history.json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  $("btnImp").onclick = function(){ $("impFile").click(); };
  $("impFile").onchange = function(){
    var f = this.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function(){
      try{
        var inc = JSON.parse(r.result);
        // лучшие результаты: берём максимум
        var b = lsGet(K_BEST);
        Object.keys(inc.hwBest||{}).forEach(function(id){
          if (!(id in b) || inc.hwBest[id] > b[id]) b[id] = inc.hwBest[id];
        });
        lsSet(K_BEST, b);
        // попытки: объединяем без дублей (по времени попытки)
        var log = lsGet(K_LOG);
        Object.keys(inc.hwLog||{}).forEach(function(id){
          var cur = log[id] = log[id] || [];
          var seen = {}; cur.forEach(function(a){ seen[a.d] = 1; });
          (inc.hwLog[id]||[]).forEach(function(a){
            if (seen[a.d]) return;
            cur.push({ d:a.d, score:a.score, total:a.total,
                       wrong:(a.wrong||[]).map(function(w){
                         return typeof w === "number" ? {n:w, ch:null} : {n:w.n, ch:("ch" in w)?w.ch:null};
                       }) });
          });
          cur.sort(function(a,b){ return a.d.localeCompare(b.d); });
        });
        lsSet(K_LOG, log);
        if (Array.isArray(inc.hwEvents)){
          var ev = evGet(), seenEv = {};
          ev.forEach(function(x){ seenEv[x.t + "|" + x.e + "|" + (x.n||"")] = 1; });
          inc.hwEvents.forEach(function(x){
            if (!seenEv[x.t + "|" + x.e + "|" + (x.n||"")]) ev.push(x);
          });
          ev.sort(function(a,b){ return (a.t||"").localeCompare(b.t||""); });
          try{ localStorage.setItem(K_EV, JSON.stringify(ev.slice(-5000))); }catch(e){}
        }
        renderList();
      }catch(e){ alert("Файл не похож на экспорт истории."); }
    };
    r.readAsText(f);
  };

  /* ---------- навигация ---------- */
  function logQuitIfRunning(){
    if (!$("vQuiz").hidden && st.test) addEvent({ e:"quit", test:st.test.id, at:st.i+1 });
  }
  $("nav-quiz").onclick = function(){ logQuitIfRunning(); location.href = "index.html"; };
  $("nav-dict").onclick = function(){ logQuitIfRunning(); location.href = "index.html#dict"; };
  $("nav-hw").onclick = function(){ logQuitIfRunning(); renderList(); };
  $("seg-tests").onclick = renderList;
  $("seg-stats").onclick = renderStats;
  $("btnQuit").onclick = function(){ logQuitIfRunning(); renderList(); };

  // для автотестов
  window.__hw = { assemble: assemble, assembleText: assembleText,
                  sentenceHTML: sentenceHTML, state: st, start: startTest,
                  renderList: renderList, renderStats: renderStats,
                  getLog: function(){ return lsGet(K_LOG); }, buildExport: buildExport, getEvents: evGet };

  renderList();
})();
</script>
</body>
</html>
